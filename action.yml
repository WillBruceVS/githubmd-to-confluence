name: "Upload Markdown to Confluence"
description: "Sync GitHub docs to Confluence"
author: "William Bruce"

inputs:
  confluence_url:
    description: "Confluence Space URL"
    required: true
  confluence_email:
    description: "Confluence login email"
    required: true
  root_page_id:
    description: "Parent page ID"
    required: true
  root_dir:
    description: "Directory containing markdown"
    required: true
    default: "."
  space:
    description: "Confluence API key"
    required: true

runs:
  using: docker
  image: Dockerfile
  env:
    CONFLUENCE_URL: ${{ inputs.confluence_url }}
    CONFLUENCE_EMAIL: ${{ inputs.confluence_email }}
    ROOT_PAGE_ID: ${{ inputs.root_page_id }}
    ROOT_DIR: ${{ inputs.root_dir }}
    SPACE: ${{ inputs.space }}
