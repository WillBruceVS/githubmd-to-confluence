name: "Upload Markdown to Confluence"
description: "Sync GitHub docs to Confluence"
author: "William Bruce"

inputs:
  confluence_url:
    description: "Confluence Space URL"
    required: true
  confluence_email:
    description: "Confluence login email"
    required: true
  root_page_id:
    description: "Parent page ID"
    required: true
  root_dir:
    description: "Directory containing markdown"
    required: true
    default: "."
  space:
    description: "Confluence space key"
    required: true

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - --confluence-url
    - ${{ inputs.confluence_url }}
    - --confluence-email
    - ${{ inputs.confluence_email }}
    - --root-page-id
    - ${{ inputs.root_page_id }}
    - --root-dir
    - ${{ inputs.root_dir }}
    - --space
    - ${{ inputs.space }}
